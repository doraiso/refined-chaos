<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドライソのほめぱげ</title>
  <style>
    :root {
      --accent: #ff4d6d;
      --accent2: #ff9a3c;
      --bg: #0f1115;
      --card: #1a1d24;
      --card-border: #2a2d36;
      --text: #e6e6e6;
      --muted: #888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 32px;
    }

    /* ヘッダー */
    .hero {
      text-align: center;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    /* 💩 シームレススクロール */
    .poop-track {
      width: 100%;
      max-width: 500px;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    }

    .poop-inner {
      display: flex;
      width: max-content;
      animation: marquee 6s linear infinite;
      font-size: 1.6rem;
      gap: 12px;
    }

    @keyframes marquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* メインカード */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 36px 48px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4d6d;
      margin-right: 6px;
      animation: blink 1.4s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .status-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message {
      font-size: 1.4rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.5;
    }

    .sub {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      margin-top: 12px;
    }

    /* フッター */
    footer {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid #333;
      padding-bottom: 1px;
    }

    footer a:hover { color: var(--text); border-color: var(--muted); }
  </style>
</head>
<body>

  <div class="hero">
    <p class="eyebrow">welcome to</p>
    <h1>ドライソのほめぱげ</h1>
  </div>

  <div class="poop-track">
    <div class="poop-inner">
      <!-- 2セット並べることでシームレスループ -->
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
      <!-- ループ用の複製 -->
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
      <span>💩</span><span>💩</span><span>💩</span><span>💩</span><span>💩</span>
    </div>
  </div>

  <div class="card">
    <div class="status-label">
      <span class="status-dot"></span>
      live update
    </div>
    <p class="message">うんこ漏らした</p>
    <p class="sub">— ドライソ</p>
  </div>

  <footer>
    <a href="https://github.com/doraiso/refined-chaos">github</a>
    &nbsp;·&nbsp;
    hand-coded with 💩
  </footer>

</body>
</html>
