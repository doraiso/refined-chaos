<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドライソ</title>

  <style>
    :root {
      --accent: #ff4d6d;
      --bg: #0f1115;
      --card: #1a1d24;
      --text: #e6e6e6;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ff4d6d, #ff9a3c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 💩スクロール */
    .poop-scroll {
      overflow: hidden;
      white-space: nowrap;
      margin-bottom: 30px;
      opacity: 0.7;
    }

    .poop-scroll span {
      display: inline-block;
      padding-left: 100%;
      font-size: 2rem;
      letter-spacing: 8px;
      animation: scroll 8s linear infinite;
    }

    @keyframes scroll {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-100%);
      }
    }

    .card {
      background: var(--card);
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      animation: fadeIn 1s ease;
    }

    .message {
      font-size: 1.2rem;
      opacity: 0.8;
      animation: pulse 2s infinite;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 0.3; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ドライソのほめぱげにようこそ！</h1>

    <div class="poop-scroll">
      <span>💩💩💩💩💩💩💩💩💩💩💩💩💩💩💩💩💩💩</span>
    </div>

    <div class="card">
      <p class="message">うんこ漏らした</p>
    </div>
  </div>
</body>
</html>
